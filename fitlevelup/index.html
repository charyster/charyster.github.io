<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FitLevelUp</title>
    <meta name="description" content="Soporte y privacidad de FitLevelUp.">
    <style>
      :root { color-scheme: dark; --bg: #070a09; --line: rgba(255,255,255,.16); --text: #f4f6f1; --muted: rgba(244,246,241,.72); --accent: #60ff7e; }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; background: linear-gradient(90deg, rgba(3,74,45,.2), rgba(100,0,13,.18)), var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; line-height: 1.55; }
      main { width: min(820px, calc(100% - 36px)); margin: 0 auto; padding: 56px 0; }
      nav { margin-bottom: 38px; }
      h1 { margin: 0 0 12px; font-size: clamp(42px, 9vw, 76px); line-height: .95; letter-spacing: 0; }
      p { margin: 0 0 18px; color: var(--muted); font-size: 18px; }
      .panel { display: grid; gap: 14px; padding: 22px; border: 1px solid var(--line); border-radius: 8px; background: rgba(255,255,255,.06); }
      a { color: var(--accent); }
      .button { display: inline-grid; place-items: center; width: fit-content; min-height: 42px; padding: 0 16px; border: 1px solid rgba(96,255,126,.54); border-radius: 8px; color: var(--text); text-decoration: none; font-weight: 800; }
    </style>
  </head>
  <body>
    <main>
      <nav>
        <a href="../">Charyster Apps</a>
      </nav>

      <h1>FitLevelUp</h1>
      <p>Entrenamientos, rutinas, progreso, niveles y comunidad en una app pensada para avanzar poco a poco.</p>

      <section class="panel">
        <h2>Soporte</h2>
        <p>Para soporte, privacidad o eliminación de cuenta, escribe a:</p>
        <p><a href="mailto:soporte.fitlevelup.app@proton.me">soporte.fitlevelup.app@proton.me</a></p>
        <a class="button" href="./privacy.html">Política de privacidad</a>
      </section>
    </main>
  </body>
</html>
