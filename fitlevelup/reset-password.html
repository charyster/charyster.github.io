<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cambiar contraseña — FitLevelUp</title>
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/webp" href="../assets/fitlevel-logo-red-green-transparent.webp">
    <style>
      :root { color-scheme: dark; --green: #60ff7e; --red: #ff5360; --muted: #94a19a; }
      * { box-sizing: border-box; }
      body {
        margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 24px;
        color: #f5f8f5; font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: radial-gradient(circle at 15% 10%, rgba(96,255,126,.15), transparent 34%), radial-gradient(circle at 90% 20%, rgba(255,61,77,.13), transparent 32%), #030705;
      }
      main { width: min(430px, 100%); padding: 28px; border: 1px solid rgba(96,255,126,.28); border-radius: 18px; background: rgba(5,13,8,.88); box-shadow: 0 25px 80px rgba(0,0,0,.5); }
      img { display: block; width: 190px; max-width: 70%; margin: 0 auto 20px; }
      h1 { margin: 0 0 10px; font-size: 30px; }
      p { margin: 0 0 20px; color: var(--muted); line-height: 1.5; }
      form { display: grid; gap: 14px; }
      label { display: grid; gap: 7px; font-weight: 800; }
      input, button { min-height: 50px; border-radius: 10px; font: inherit; }
      input { width: 100%; padding: 0 14px; color: white; border: 1px solid rgba(96,255,126,.25); background: #07100a; }
      button { border: 0; color: #031006; background: var(--green); font-weight: 900; cursor: pointer; }
      button:disabled { opacity: .55; cursor: wait; }
      #message { min-height: 24px; margin-top: 16px; color: var(--green); font-weight: 750; }
      #message.error { color: var(--red); }
      a { color: var(--green); }
    </style>
  </head>
  <body>
    <main>
      <img src="../assets/fitlevel-logo-red-green-transparent.webp" alt="FitLevelUp">
      <h1>Cambiar contraseña</h1>
      <p>Escribe una contraseña nueva para volver a entrar en FitLevelUp.</p>
      <form id="resetForm">
        <label>Nueva contraseña<input id="password" type="password" minlength="6" autocomplete="new-password" required></label>
        <label>Repite la contraseña<input id="passwordConfirm" type="password" minlength="6" autocomplete="new-password" required></label>
        <button id="submitButton" type="submit">Guardar contraseña</button>
      </form>
      <div id="message" role="status" aria-live="polite">Comprobando el enlace de recuperación…</div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      const client = window.supabase.createClient(
        "https://eofdtpleeawtqdovwsub.supabase.co",
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVvZmR0cGxlZWF3dHFkb3Z3c3ViIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1NzM5NDgsImV4cCI6MjA5MzE0OTk0OH0.2Vs1Rw2-LxMiY3X7eTku91_K0uMavrzLUERLBrs4ziU"
      );
      const form = document.querySelector("#resetForm");
      const message = document.querySelector("#message");
      const submitButton = document.querySelector("#submitButton");

      function showMessage(text, isError = false) {
        message.textContent = text;
        message.classList.toggle("error", isError);
      }

      async function verifyRecoverySession() {
        const { data, error } = await client.auth.getSession();
        if (error || !data.session) {
          showMessage("El enlace no es válido o ha caducado. Solicita uno nuevo desde la app.", true);
          form.hidden = true;
          return;
        }
        showMessage("Enlace correcto. Ya puedes guardar una contraseña nueva.");
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const password = document.querySelector("#password").value;
        const confirmation = document.querySelector("#passwordConfirm").value;
        if (password !== confirmation) {
          showMessage("Las contraseñas no coinciden.", true);
          return;
        }
        submitButton.disabled = true;
        showMessage("Guardando contraseña…");
        const { error } = await client.auth.updateUser({ password });
        if (error) {
          submitButton.disabled = false;
          showMessage(error.message, true);
          return;
        }
        await client.auth.signOut();
        form.hidden = true;
        showMessage("Contraseña actualizada. Ya puedes volver a FitLevelUp e iniciar sesión.");
      });

      verifyRecoverySession();
    </script>
  </body>
</html>
