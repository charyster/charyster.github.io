<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Soporte — FitLevelUp</title>
    <meta name="description" content="Información de soporte y contacto de FitLevelUp.">
    <link rel="icon" type="image/webp" href="../assets/fitlevel-logo-red-green-transparent.webp">
    <style>
      :root { color-scheme: dark; --text: #f4f7f2; --muted: rgba(235,241,234,.68); --green: #60ff7e; --line: rgba(96,255,126,.28); }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 28px; color: var(--text); background: radial-gradient(circle at 12% 14%, rgba(96,255,126,.14), transparent 34%), radial-gradient(circle at 88% 80%, rgba(255,61,77,.12), transparent 35%), #050806; font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      main { width: min(760px, 100%); padding: clamp(28px, 6vw, 58px); border: 1px solid var(--line); border-radius: 18px; background: rgba(8,16,11,.78); box-shadow: 0 34px 100px rgba(0,0,0,.42); backdrop-filter: blur(18px); }
      .eyebrow { color: var(--green); font-size: 12px; font-weight: 900; letter-spacing: .2em; text-transform: uppercase; }
      h1 { margin: 12px 0 16px; font-size: clamp(44px, 9vw, 78px); line-height: .94; letter-spacing: -.055em; }
      p { color: var(--muted); font-size: 18px; line-height: 1.6; }
      .contact { margin: 30px 0; padding: 22px; border: 1px solid rgba(255,255,255,.12); border-radius: 12px; background: rgba(255,255,255,.04); }
      .contact span { display: block; margin-bottom: 7px; color: var(--muted); font-size: 12px; font-weight: 850; letter-spacing: .12em; text-transform: uppercase; }
      .contact a { color: var(--green); font-size: clamp(16px, 4vw, 23px); font-weight: 900; overflow-wrap: anywhere; }
      .actions { display: flex; flex-wrap: wrap; gap: 10px; }
      .button { display: inline-flex; min-height: 44px; align-items: center; padding: 0 16px; border: 1px solid rgba(96,255,126,.55); border-radius: 9px; color: var(--text); background: rgba(96,255,126,.07); text-decoration: none; font-weight: 850; }
      .button.primary { color: #021006; background: var(--green); }
    </style>
  </head>
  <body>
    <main>
      <span class="eyebrow">Centro de ayuda</span>
      <h1>Soporte de FitLevelUp</h1>
      <p>Para consultas sobre acceso, funcionamiento, privacidad o eliminación de cuenta, contacta mediante el correo oficial.</p>
      <section class="contact">
        <span>Correo de soporte</span>
        <a href="mailto:soporte.fitlevelup.app@proton.me">soporte.fitlevelup.app@proton.me</a>
      </section>
      <div class="actions">
        <a class="button primary" href="mailto:soporte.fitlevelup.app@proton.me">Enviar correo</a>
        <a class="button" href="./privacy.html">Política de privacidad</a>
        <a class="button" href="./">Volver a FitLevelUp</a>
      </div>
    </main>
  </body>
</html>
